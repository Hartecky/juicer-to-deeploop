name: juicer-to-deeploop
channels:
  - conda-forge
  - defaults
  - bioconda

dependencies:
  - python=3.7
  - pip
  - openjdk
  - parallel
  - make
  - java-jdk
  - gcc
  - coreutils
  - pigz
  - curl

  - pip:
    - numpy
    - scipy
    - pandas
    - tqdm
    - matplotlib
    - opencv-python
    - tensorflow==2.3.1
    - keras
    - scikit-learn